name: Manual release (fallback)

# Fallback release pipeline — kept around for hotfixes and emergencies.
#
# The primary release flow is `.github/workflows/auto-release.yml`, which
# triggers automatically on conventional-commit pushes to main. Use this
# manual workflow only when:
#   - You need to re-release an existing version (overwrite Marketplace ZIPs
#     after fixing a botched release) — set `force=true`.
#   - You want to publish a GitHub Release without touching Marketplace
#     (during a Marketplace outage, for example) — set `skip_marketplace=true`.
#   - You've manually bumped `pluginBaseVersion` in both build.gradle.kts
#     outside the conventional-commits flow and want to publish that.
#
# This workflow reads `val pluginBaseVersion = "..."` from BOTH build.gradle.kts
# files and refuses to release on a mismatch. Trigger from the Actions tab:
# https://github.com/Apachaika/pycharm-gcp-workbench/actions/workflows/release.yml

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Release even if the v<version> tag already exists (re-runs build, overwrites assets)"
        required: false
        type: boolean
        default: false
      skip_marketplace:
        description: "Skip JetBrains Marketplace upload (only build and create GitHub Release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect version + tag status
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version from both build.gradle.kts
        id: read
        # Both files declare `val pluginBaseVersion = "<semver>"` as the single
        # source of truth for the logical release version. The 2025.3.x line
        # publishes verbatim as <pluginBaseVersion>; the 2026.1.x line adds a
        # "-261" build-line suffix to its Marketplace `version` so that the
        # two ZIPs can coexist under one plugin id (Marketplace rejects two
        # uploads sharing the same `version` string). The GitHub Release tag
        # is always v<pluginBaseVersion> without the suffix.
        run: |
          set -euo pipefail
          ROOT_VERSION=$(grep -E '^val pluginBaseVersion = "' build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SUB_VERSION=$(grep -E '^val pluginBaseVersion = "' pycharm-plugin-2026.1/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          if [[ -z "$ROOT_VERSION" ]]; then
            echo "::error file=build.gradle.kts::Could not read 'val pluginBaseVersion = \"...\"' from build.gradle.kts"
            exit 1
          fi
          if [[ -z "$SUB_VERSION" ]]; then
            echo "::error file=pycharm-plugin-2026.1/build.gradle.kts::Could not read 'val pluginBaseVersion = \"...\"' from pycharm-plugin-2026.1/build.gradle.kts"
            exit 1
          fi
          if [[ "$ROOT_VERSION" != "$SUB_VERSION" ]]; then
            echo "::error::pluginBaseVersion mismatch between build lines: root=$ROOT_VERSION, 2026.1=$SUB_VERSION. Bump both files to the same value."
            exit 1
          fi
          if ! [[ "$ROOT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "::error::pluginBaseVersion '$ROOT_VERSION' is not a valid semver string"
            exit 1
          fi

          echo "version=$ROOT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$ROOT_VERSION"     >> "$GITHUB_OUTPUT"
          echo "Detected plugin base version: $ROOT_VERSION (tag would be v$ROOT_VERSION; 2026.1.x ZIP publishes as ${ROOT_VERSION}-261)"

      - name: Decide whether to release this version
        id: decide
        env:
          TAG: ${{ steps.read.outputs.tag }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            if [[ "$FORCE" == "true" ]]; then
              echo "::warning::Tag $TAG already exists, but force=true → re-releasing."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $TAG already exists → nothing to release. Bump version in both build.gradle.kts files (or rerun this workflow with force=true) to publish."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Tag $TAG does not exist → will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.line.name }})
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        line:
          - name: "2025.3.x"
            dir: "."
            pycharm: "2025.3.5"
            suffix: "pycharm-2025.3.x-build-253"
          - name: "2026.1.x"
            dir: "pycharm-plugin-2026.1"
            pycharm: "2026.1.2"
            suffix: "pycharm-2026.1.x-build-261"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test + build plugin
        working-directory: ${{ matrix.line.dir }}
        run: |
          ./gradlew test buildPlugin \
            -PtargetPyCharmVersion=${{ matrix.line.pycharm }} \
            -PartifactSuffix=${{ matrix.line.suffix }} \
            --no-daemon --stacktrace

      - name: Upload built ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.line.suffix }}
          path: ${{ matrix.line.dir }}/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish to JetBrains Marketplace
        if: github.event.inputs.skip_marketplace != 'true'
        # continue-on-error stays ON so a Marketplace rejection does not
        # block the GitHub Release. We surface the failure as a workflow
        # annotation below so it is still visible on the Actions run page.
        continue-on-error: true
        id: marketplace
        working-directory: ${{ matrix.line.dir }}
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          JETBRAINS_CERTIFICATE_CHAIN:  ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          JETBRAINS_PRIVATE_KEY:        ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ -z "${JETBRAINS_MARKETPLACE_TOKEN}" ]]; then
            echo "::notice title=Marketplace publish skipped::JETBRAINS_MARKETPLACE_TOKEN secret is not set. Add it at https://github.com/${{ github.repository }}/settings/secrets/actions to enable auto-publish."
            exit 0
          fi
          ./gradlew publishPlugin \
            -PtargetPyCharmVersion=${{ matrix.line.pycharm }} \
            -PartifactSuffix=${{ matrix.line.suffix }} \
            --no-daemon --stacktrace

      - name: Annotate Marketplace publish result (${{ matrix.line.name }})
        if: always() && github.event.inputs.skip_marketplace != 'true'
        run: |
          if [[ "${{ steps.marketplace.outcome }}" == "failure" ]]; then
            echo "::error title=Marketplace publish FAILED (${{ matrix.line.name }})::./gradlew publishPlugin for ${{ matrix.line.suffix }} exited non-zero. See the 'Publish to JetBrains Marketplace' step above for the exact error. The GitHub Release is still created. Either rerun the workflow once the issue is fixed, or upload dist/vertex-workbench-pycharm-${{ matrix.line.suffix }}.zip manually at https://plugins.jetbrains.com/plugin/edit"
            exit 0
          fi
          if [[ "${{ steps.marketplace.outcome }}" == "success" ]]; then
            echo "::notice title=Marketplace publish OK (${{ matrix.line.name }})::publishPlugin succeeded for ${{ matrix.line.suffix }}."
          fi

  release:
    name: Tag + Publish GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built ZIPs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename to stable filenames
        run: |
          set -euo pipefail
          cd dist
          echo "Downloaded ZIPs:"
          ls -lh
          for f in *pycharm-2025.3.x*.zip; do
            mv -v "$f" "vertex-workbench-pycharm-pycharm-2025.3.x-build-253.zip"
          done
          for f in *pycharm-2026.1.x*.zip; do
            mv -v "$f" "vertex-workbench-pycharm-pycharm-2026.1.x-build-261.zip"
          done
          echo "Final assets:"
          ls -lh

      - name: Extract changelog section for this version
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          : > release_body.md
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/        { exit }
              capture                    { print }
            ' CHANGELOG.md > release_body.md || true
          fi
          if [[ ! -s release_body.md ]]; then
            echo "_No CHANGELOG.md section found for v$VERSION — see the auto-generated commit list below._" > release_body.md
          fi
          echo "Release body:"
          cat release_body.md

      - name: Create GitHub Release + tag
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.detect.outputs.tag }}
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: release_body.md
          fail_on_unmatched_files: true
          files: |
            dist/vertex-workbench-pycharm-pycharm-2025.3.x-build-253.zip
            dist/vertex-workbench-pycharm-pycharm-2026.1.x-build-261.zip
